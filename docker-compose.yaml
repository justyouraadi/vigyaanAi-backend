services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    # REMOVED the ports section so it is no longer exposed to the internet.
    # Added environment variables to enforce authentication.
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=SuperSecurePassword123! # Change this!
    volumes:
      - /home/azureuser/vigyaanai/mongo_data:/data/db
    restart: always

  backend:
    build: .
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Updated MONGO_URL to include the new credentials
      - MONGO_URL=mongodb://admin:SuperSecurePassword123!@mongodb:27017/?authSource=admin
      - DB_NAME=test_database
      - CORS_ORIGINS="*"
      - RAZORPAY_KEY_ID=rzp_test_demo123
      - RAZORPAY_KEY_SECRET=demo_secret_key
      - STRIPE_API_KEY=sk_test_emergent
      - EMERGENT_LLM_KEY=sk-emergent-1378f14659451EdBbF
    depends_on:
      - mongodb
    restart: always

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      # Updated to match the new MongoDB credentials
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=SuperSecurePassword123!
      # UI login credentials
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongodb
    restart: always

# Removed the bottom `volumes: mongo_data:` declaration because 
# you are using a direct host bind mount (/home/azureuser/...) above.