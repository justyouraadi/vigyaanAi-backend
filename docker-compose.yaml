services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - /home/azureuser/vigyaanai/mongo_data:/data/db
    restart: always

  backend:
    build: .
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=test_database
      - CORS_ORIGINS="*"
      - RAZORPAY_KEY_ID=rzp_test_demo123
      - RAZORPAY_KEY_SECRET=demo_secret_key
      - STRIPE_API_KEY=sk_test_emergent
      - EMERGENT_LLM_KEY=sk-emergent-1378f14659451EdBbF
    depends_on:
      - mongodb
    restart: always

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongodb
    restart: always

volumes:
  mongo_data: